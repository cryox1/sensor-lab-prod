name: sensor-lab

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sensor-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${SENSOR_DATA_DIR:-./data}/mosquitto/data:/mosquitto/data
      - ${SENSOR_DATA_DIR:-./data}/mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: sensor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Published on a NON-default host port so it never collides with — or can
    # touch — any other PostgreSQL already running on the host (which owns 5432).
    # Other services reach it on the compose network at the internal 5432.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ${SENSOR_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest:
    build: ./ingest
    container_name: sensor-ingest
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Blitzortung.org strike consumer — stays dark unless HOME_LAT/LON are
      # set in .env. On the server, add these lines there by hand (deploy.sh
      # never syncs compose/.env — see AGENTS.md).
      BLITZ_HOME_LAT: ${BLITZ_HOME_LAT:-}
      BLITZ_HOME_LON: ${BLITZ_HOME_LON:-}
      BLITZ_RADIUS_KM: ${BLITZ_RADIUS_KM:-250}
      BLITZ_MQTT_HOST: ${BLITZ_MQTT_HOST:-blitzortung.ha.sed.pl}
      BLITZ_MQTT_PORT: ${BLITZ_MQTT_PORT:-1883}
      BLITZ_RETENTION_DAYS: ${BLITZ_RETENTION_DAYS:-0}
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build: ./api
    container_name: sensor-api
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_WRITE_TOKEN: ${API_WRITE_TOKEN:-}
      # GET /strikes meta (map circle + feature-off signal). Must match ingest.
      BLITZ_HOME_LAT: ${BLITZ_HOME_LAT:-}
      BLITZ_HOME_LON: ${BLITZ_HOME_LON:-}
      BLITZ_RADIUS_KM: ${BLITZ_RADIUS_KM:-250}
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build: ./web
    container_name: sensor-web
    restart: unless-stopped
    environment:
      # Leave unset to auto-detect from browser host (works for LAN, Tailscale, localhost).
      # Set only when API is behind a fixed hostname/reverse proxy.
      NEXT_PUBLIC_API_BASE: ${WEB_API_BASE:-}
      NEXT_PUBLIC_WS_URL: ${WEB_WS_URL:-}
      NEXT_PUBLIC_API_PORT: ${WEB_API_PORT:-8000}
      NEXT_PUBLIC_API_WRITE_TOKEN: ${WEB_API_WRITE_TOKEN:-}
    ports:
      - "9530:3000"
    depends_on:
      - api

# Stateful data lives in bind mounts under ${SENSOR_DATA_DIR} (default ./data
# locally; e.g. /mnt/data/sensor-lab on a server). No named volumes:
# a named volume on the host root fs is what filled the disk and, when a deploy
# reverted the compose, mounted an empty volume and wiped the DB. See AGENTS.md.
#
# Postgres data is under ${SENSOR_DATA_DIR}/postgres (its own dir, isolated from
# any other PostgreSQL on the host). The pre-migration TimescaleDB lived under
# .../tsdb and Redpanda under .../redpanda — those dirs are kept as rollback.
